<body>
    <h1>Login</h1>
    <form method="POST">
        {% csrf_token %}
        <label>Name:</label>
        <input type="text" name="name" required>
        <br>
        <label>User ID:</label>
        <input type="number" name="user_id" required>
        <br>
        <button type="submit">Login</button>
    </form>

    <h2>Users</h2>
    <ul>
    {% for user in users %}
        <li>{{ user.name }} (ID: {{ user.user_id }}) {% if user.isadmin %}[ADMIN]{% endif %}</li>
    {% empty %}
        <li>No users yet</li>
    {% endfor %}
    </ul>
</body>
</html>
