<!DOCTYPE html>
<html>
<head>
    <title>Messenger</title>
</head>
<body>
    <h1>Create User</h1>
    <form method="POST">
        {% csrf_token %}
        <label>Name:</label>
        <input type="text" name="name" required>
        <br>
        <label>User ID:</label>
        <input type="number" name="user_id" required>
        <br>
         <!-- admin piiloitettu, mutta se on silti olemassa ja voidaan lähettää 
          Voidaan vaihtaa type checkboxiksi jolloin käyttäjä voi valita admin-oikeudet -->
        <input type="hidden" name="isadmin" value="false">
        <button type="submit">Create User</button>
    </form>

    <h2>Users</h2>
    <ul>
    {% for user in users %}
        <li>{{ user.name }} (ID: {{ user.user_id }}) {% if user.isadmin %}[ADMIN]{% endif %}</li>
    {% empty %}
        <li>No users yet</li>
    {% endfor %}
    </ul>
</body>
</html>
